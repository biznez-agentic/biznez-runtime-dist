{{- if not .Values.postgres.external.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "biznez.fullname" . }}-db-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "biznez.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ include "biznez.databaseUrl" . | b64enc | quote }}
{{- end }}
