{{- if not .Values.backend.existingSecret }}
{{- $encKey := .Values.backend.secrets.encryptionKey | required "backend.secrets.encryptionKey is required when backend.existingSecret is not set. Generate a Fernet key with: python -c \"from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())\"" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "biznez.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "biznez.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
type: Opaque
data:
  ENCRYPTION_KEY: {{ $encKey | b64enc | quote }}
  JWT_SECRET_KEY: {{ (.Values.backend.secrets.jwtSecret | default (randAlphaNum 64)) | b64enc | quote }}
{{- end }}
