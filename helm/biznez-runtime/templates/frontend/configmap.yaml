apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "biznez.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "biznez.componentLabels" (dict "root" . "component" "frontend") | nindent 4 }}
data:
  env-config.js: |
    window.__ENV__ = {
      API_BASE_URL: {{ .Values.frontend.config.apiUrl | default (include "biznez.publicUrl.api" .) | toJson }},
      WS_BASE_URL: {{ .Values.frontend.config.wsUrl | default "" | toJson }}
    };
