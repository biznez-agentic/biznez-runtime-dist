apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "biznez.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "biznez.componentLabels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "biznez.componentSelectorLabels" (dict "root" . "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "biznez.componentLabels" (dict "root" . "component" "frontend") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/frontend/configmap.yaml") . | sha256sum }}
        {{- with .Values.frontend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "biznez.serviceAccountName" . }}
      {{- end }}
      securityContext:
        {{- include "biznez.podSecurityContext" (dict "root" . "component" .Values.frontend) | nindent 8 }}
      initContainers:
        - name: copy-nginx-config
          image: {{ include "biznez.imageRef" (dict "root" . "image" .Values.frontend.image) }}
          imagePullPolicy: {{ include "biznez.imagePullPolicy" (dict "root" . "image" .Values.frontend.image) }}
          command:
            - sh
            - -c
            - cp -rp /etc/nginx/. /nginx-config/
          volumeMounts:
            - name: nginx-config
              mountPath: /nginx-config
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: frontend
          image: {{ include "biznez.imageRef" (dict "root" . "image" .Values.frontend.image) }}
          imagePullPolicy: {{ include "biznez.imagePullPolicy" (dict "root" . "image" .Values.frontend.image) }}
          securityContext:
            {{- include "biznez.containerSecurityContext" (dict "root" . "component" .Values.frontend) | nindent 12 }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          {{- with .Values.frontend.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.frontend.probes.readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            {{- include "biznez.tmpVolumeMount" . | nindent 12 }}
            - name: nginx-config
              mountPath: /etc/nginx
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: env-config
              mountPath: /usr/share/nginx/html/env-config.js
              subPath: env-config.js
              readOnly: true
            {{- with .Values.frontend.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- include "biznez.tmpVolume" . | nindent 8 }}
        - name: nginx-config
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: env-config
          configMap:
            name: {{ include "biznez.fullname" . }}-frontend
        {{- with .Values.frontend.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
