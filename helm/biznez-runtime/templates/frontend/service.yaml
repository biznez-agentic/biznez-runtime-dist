apiVersion: v1
kind: Service
metadata:
  name: {{ include "biznez.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "biznez.componentLabels" (dict "root" . "component" "frontend") | nindent 4 }}
  {{- with .Values.frontend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port | default 80 }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "biznez.componentSelectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}
