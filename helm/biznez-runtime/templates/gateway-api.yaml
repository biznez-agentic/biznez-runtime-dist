{{- if .Values.gatewayApi.enabled -}}
{{- /*
  NOTE: CRD availability check removed. Helm 4 includes apps/v1 in Capabilities
  even during `helm template`, making the apps/v1 heuristic unreliable for
  distinguishing template mode from live cluster. The gatewayRef.name guard in
  validate.yaml still catches misconfigurations. If Gateway API CRDs are missing
  on a live cluster, kubectl apply will fail with a clear error.
*/ -}}
{{- $fullname := include "biznez.fullname" . -}}
{{- $gwName := required "gatewayApi.gatewayRef.name is required when gatewayApi is enabled" .Values.gatewayApi.gatewayRef.name -}}
{{- range $idx, $route := .Values.gatewayApi.httpRoutes }}
{{- if $idx }}
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}-{{ $route.service }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "biznez.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gwName }}
      {{- if $.Values.gatewayApi.gatewayRef.namespace }}
      namespace: {{ $.Values.gatewayApi.gatewayRef.namespace }}
      {{- end }}
  hostnames:
    - {{ $route.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "biznez.ingressServiceName" (dict "root" $ "service" $route.service) }}
          port: {{ include "biznez.ingressServicePort" (dict "root" $ "service" $route.service "port" $route.port) }}
{{- end }}
{{- end }}
