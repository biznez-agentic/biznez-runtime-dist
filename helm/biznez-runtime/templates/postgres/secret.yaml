{{- if and .Values.postgres.enabled (not .Values.postgres.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "biznez.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "biznez.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
type: Opaque
data:
  POSTGRES_USER: {{ (.Values.postgres.secrets.user | default "biznez") | b64enc | quote }}
  POSTGRES_PASSWORD: {{ (required "postgres.secrets.password is required when postgres.enabled=true and postgres.existingSecret is not set. Generate with: openssl rand -base64 32" .Values.postgres.secrets.password) | b64enc | quote }}
{{- end }}
