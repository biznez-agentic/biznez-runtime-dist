{{- if and .Values.postgres.enabled (not .Values.postgres.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "biznez.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "biznez.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
type: Opaque
data:
  POSTGRES_USER: {{ (.Values.postgres.secrets.user | default "biznez") | b64enc | quote }}
  POSTGRES_PASSWORD: {{ (.Values.postgres.secrets.password | default (randAlphaNum 32)) | b64enc | quote }}
{{- end }}
