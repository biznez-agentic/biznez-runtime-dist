{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "biznez.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "biznez.labels" . | nindent 4 }}
  {{- with .Values.global.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
