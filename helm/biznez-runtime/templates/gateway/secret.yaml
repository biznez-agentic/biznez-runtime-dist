{{- if and .Values.gateway.enabled (not .Values.gateway.existingSecret) (not (empty .Values.gateway.secrets)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "biznez.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "biznez.componentLabels" (dict "root" . "component" "gateway") | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.gateway.secrets }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
