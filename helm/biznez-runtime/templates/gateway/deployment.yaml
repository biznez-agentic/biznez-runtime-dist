{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "biznez.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "biznez.componentLabels" (dict "root" . "component" "gateway") | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "biznez.componentSelectorLabels" (dict "root" . "component" "gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "biznez.componentLabels" (dict "root" . "component" "gateway") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/gateway/configmap.yaml") . | sha256sum }}
        {{- if and (not .Values.gateway.existingSecret) (not (empty .Values.gateway.secrets)) }}
        checksum/secret: {{ include (print $.Template.BasePath "/gateway/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- /* NOTE: When using gateway.existingSecret, secret rotation requires:
               kubectl rollout restart deployment/<fullname>-gateway */ -}}
        {{- with .Values.gateway.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "biznez.serviceAccountName" . }}
      {{- end }}
      securityContext:
        {{- include "biznez.podSecurityContext" (dict "root" . "component" .Values.gateway) | nindent 8 }}
      containers:
        - name: gateway
          image: {{ include "biznez.imageRef" (dict "root" . "image" .Values.gateway.image) }}
          imagePullPolicy: {{ include "biznez.imagePullPolicy" (dict "root" . "image" .Values.gateway.image) }}
          securityContext:
            {{- include "biznez.containerSecurityContext" (dict "root" . "component" .Values.gateway) | nindent 12 }}
          args:
            - "-f"
            - "/etc/agentgateway/config.yaml"
          ports:
            - name: mcp
              containerPort: {{ .Values.gateway.service.port | default 8080 }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.gateway.service.adminPort | default 15000 }}
              protocol: TCP
          {{- if or .Values.gateway.existingSecret (not (empty .Values.gateway.secrets)) }}
          envFrom:
            - secretRef:
                name: {{ include "biznez.gatewaySecretName" . }}
          {{- end }}
          {{- with .Values.gateway.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.probes.readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            {{- include "biznez.tmpVolumeMount" . | nindent 12 }}
            - name: gateway-config
              mountPath: /etc/agentgateway
              readOnly: true
            {{- with .Values.gateway.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- include "biznez.tmpVolume" . | nindent 8 }}
        - name: gateway-config
          configMap:
            name: {{ include "biznez.fullname" . }}-gateway
        {{- with .Values.gateway.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
