# Biznez Agentic Runtime -- Helm values (evaluation defaults)
# See docs/PACKAGING-PLAN.md for the full configuration contract.
# See values-production.yaml for CIS-hardened production overrides.

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
global:
  # Profile: eval | production
  # When "production", Helm templates enforce required fields via {{ required }}/{{ fail }}.
  profile: eval

  # Require digest-pinned images for all components.
  # When true, fails if any image.digest is empty.
  requireDigests: false

  # Prepended to all image references: {imageRegistry}/{component.image.repository}:{tag}
  imageRegistry: ""

  # Pull secrets for private registries
  imagePullSecrets: []
  # - name: regcred

  # Default storage class (empty = cluster default)
  storageClass: ""

  # Default image pull policy (overridable per component)
  imagePullPolicy: IfNotPresent

  # Security profile: hardened | permissive
  securityProfile: hardened

  # Pod-level security context applied to all pods (overridable per component)
  podSecurityContext:
    runAsNonRoot: true
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  # Container-level security context applied to all containers (overridable per component)
  containerSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

# ---------------------------------------------------------------------------
# Backend (FastAPI platform API)
# ---------------------------------------------------------------------------
backend:
  image:
    repository: biznez/platform-api
    tag: ""  # Defaults to appVersion from Chart.yaml
    digest: ""  # If set, overrides tag (recommended for production)
    pullPolicy: ""  # Defaults to global.imagePullPolicy

  replicas: 1

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Non-secret configuration (rendered into ConfigMap)
  config:
    environment: production
    logLevel: INFO
    corsOrigins: ""  # Derived from ingress if empty; comma-separated URLs
    frontendUrl: ""  # Derived from ingress if empty
    apiUrl: ""  # Public backend URL; derived from ingress if empty
    jwtAlgorithm: HS256
    jwtAccessTokenExpireMinutes: "30"
    jwtRefreshTokenExpireDays: "7"
    bcryptRounds: "12"
    runtimeName: biznez-runtime
    maxConcurrentAgents: "10"
    agentTimeoutSeconds: "300"
    prometheusEnabled: "true"
    prometheusPort: "9090"

  # Secret management
  existingSecret: ""  # K8s Secret name; if set, chart does NOT create a Secret
  secrets:
    encryptionKey: ""  # Fernet key (auto-generated by CLI if empty)
    jwtSecret: ""  # JWT signing key (auto-generated by CLI if empty)

  # SSE streaming timeouts
  streaming:
    proxyReadTimeout: 300
    proxySendTimeout: 300
    proxyBuffering: "off"
    maxBodySize: 10m

  # Service
  service:
    type: ClusterIP
    port: 8000
    annotations: {}

  # Health probes
  probes:
    liveness:
      httpGet:
        path: /api/v1/health
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      httpGet:
        path: /api/v1/health
        port: 8000
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      httpGet:
        path: /api/v1/health
        port: 8000
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 30

  # wait-for-db init container
  # WARNING: Disabling waitForDb with migration.mode=auto can cause migration
  # failures if the database is not ready when the initContainer starts.
  waitForDb:
    enabled: true   # Set false if init container is undesirable
    image: {}       # Defaults to postgres.image; override for external DB scenarios
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  # Per-component security context overrides (merged with global defaults)
  podSecurityContext: {}
  containerSecurityContext: {}

  # Additional env vars (list of {name, value} or {name, valueFrom})
  extraEnv: []

  # Additional volumes and mounts
  extraVolumes: []
  extraVolumeMounts: []

  # Pod annotations
  podAnnotations: {}

  # Node selector, tolerations, affinity
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Frontend (React/Nginx)
# ---------------------------------------------------------------------------
frontend:
  image:
    repository: biznez/web-app
    tag: ""
    digest: ""
    pullPolicy: ""

  replicas: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Non-secret configuration (rendered into ConfigMap)
  config:
    # API backend URL (in-cluster default; overridden when ingress is enabled)
    apiUrl: ""

  # Service
  service:
    type: ClusterIP
    port: 80
    annotations: {}

  # Health probes
  probes:
    liveness:
      httpGet:
        path: /health
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  # Per-component security context overrides
  podSecurityContext: {}
  containerSecurityContext:
    runAsUser: 101  # nginx user
    runAsGroup: 101

  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# PostgreSQL (embedded -- eval only)
# ---------------------------------------------------------------------------
postgres:
  # Set to false for production (requires external DB via postgres.external)
  enabled: true

  image:
    repository: postgres
    tag: "15-alpine"
    digest: ""
    pullPolicy: ""

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # PVC storage
  storage: 10Gi
  storageClassName: ""  # Empty = cluster default

  # Embedded DB settings
  database: biznez_platform

  # Secret management (embedded postgres)
  existingSecret: ""  # K8s Secret with POSTGRES_USER, POSTGRES_PASSWORD
  secrets:
    user: biznez
    password: ""  # Auto-generated by CLI if empty

  # Connection pool settings (passed to backend)
  pool:
    size: "5"
    maxOverflow: "10"
    poolRecycle: "1800"

  # Per-component security context overrides
  podSecurityContext:
    fsGroup: 999
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]
      add: ["CHOWN", "FOWNER"]

  # External database (used when postgres.enabled=false)
  external:
    host: ""       # Used by wait-for-db init container for pg_isready check
    port: "5432"   # Used by wait-for-db init container for pg_isready check
    database: biznez_platform
    sslMode: require
    # Full DATABASE_URL with credentials embedded (required when existingSecret is not set)
    databaseUrl: ""
    # Pre-created K8s Secret containing DATABASE_URL key (production pattern)
    existingSecret: ""

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Agent Gateway (MCP proxy)
# ---------------------------------------------------------------------------
gateway:
  enabled: true

  image:
    repository: ghcr.io/agentgateway/agentgateway
    tag: "0.1.0"
    digest: ""
    pullPolicy: ""

  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # In-cluster base URL for backend to reach gateway.
  # Empty = auto-derived from release name (recommended).
  # Override only if gateway is external or in a different namespace.
  baseUrl: ""

  # Timeouts
  timeouts:
    connectTimeout: 10s
    requestTimeout: 120s
    idleTimeout: 300s

  # Secret management (gateway API keys for MCP targets)
  existingSecret: ""
  secrets: {}
  # Example:
  #   TAVILY_API_KEY: "tvly-..."
  #   BRAVE_API_KEY: "BSA..."

  # Gateway YAML configuration (rendered into ConfigMap).
  # Structure must match the agentgateway binary's expected schema.
  # The binary uses a binds-based config with listeners nested inside each bind.
  # See: https://github.com/agentgateway/agentgateway for schema docs.
  config:
    binds:
      - port: 8080
        listeners:
          - name: default
            routes: []
    # Example with targets and auth:
    # binds:
    #   - port: 8080
    #     listeners:
    #       - name: mcp-gateway
    #         routes:
    #           - name: tavily-route
    #             matches:
    #               - path:
    #                   pathPrefix: "/org_dev001/tavily"
    #             policies:
    #               jwtAuth:
    #                 mode: strict
    #                 issuer: "https://idp.example.com"
    #                 audiences: ["app-client-id"]
    #                 jwks:
    #                   url: "https://idp.example.com/.well-known/jwks.json"
    #             backends:
    #               - mcp:
    #                   targets:
    #                     - name: tavily-mcp
    #                       mcp:
    #                         host: "https://mcp.tavily.com/mcp"

  # Health probes
  probes:
    liveness:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

  # Service
  service:
    type: ClusterIP
    port: 8080
    adminPort: 15000
    annotations: {}

  podSecurityContext: {}
  containerSecurityContext: {}
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
auth:
  # Mode: local | oidc | dual
  mode: local

  # OIDC configuration (required when mode=oidc or mode=dual)
  oidc:
    issuer: ""
    audience: ""
    jwksUrl: ""  # Auto-derived from issuer if empty
    jwksCacheTtl: 3600
    clockSkewSeconds: 30
    claims:
      subject: sub
      email: email
      name: name
      groups: groups
    roleMapping:
      adminGroups: []
      userGroups: []
    allowedEmailDomains: []

  # Local JWT auth (eval only)
  local:
    adminBootstrap:
      email: admin@biznez.local
      # Password auto-generated, printed in NOTES.txt

  # Secret for OIDC client secret
  existingSecret: ""  # K8s Secret with AUTH_CLIENT_SECRET

# ---------------------------------------------------------------------------
# LLM provider
# ---------------------------------------------------------------------------
llm:
  provider: none  # openai | anthropic | custom | none

  # Secret management
  existingSecret: ""  # K8s Secret with LLM_API_KEY
  secrets:
    apiKey: ""

# ---------------------------------------------------------------------------
# Langfuse (LLM observability)
# ---------------------------------------------------------------------------
langfuse:
  enabled: false

  host: "https://cloud.langfuse.com"

  # Secret management
  existingSecret: ""  # K8s Secret with LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY
  secrets:
    publicKey: ""
    secretKey: ""

# ---------------------------------------------------------------------------
# Database migration
# ---------------------------------------------------------------------------
migration:
  # Mode: auto | hook | manual
  #   auto: initContainer runs migrations before backend starts
  #   hook: Helm pre-install/pre-upgrade Job (blocks deploy until migration completes)
  #   manual: no migration resources rendered; operator runs migrations externally
  mode: auto

  # Job TTL (seconds after completion) for hook mode.
  # Set to null to omit (for clusters without TTL controller).
  jobTtlSeconds: 600

  # Migration command. Override when using advisory-lock wrapper module:
  #   command: ["python", "-m", "agentic_runtime.db.migration_runner"]
  command:
    - alembic
    - upgrade
    - head

  # Working directory for migration container.
  # Must contain alembic.ini and alembic/ directory.
  workingDir: /app

  # Resource overrides for migration containers.
  # Defaults to backend.resources if empty.
  resources: {}

  # Security context overrides for migration containers.
  # Defaults to backend security context if empty.
  # WARNING: Setting this replaces all defaults; provide the full context explicitly.
  containerSecurityContext: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false  # Eval default: ClusterIP + port-forward

  className: ""
  annotations: {}

  # Rendering mode: multiHost | splitByHost
  mode: multiHost

  hosts: []
  # - host: api.biznez.example.com
  #   paths:
  #     - path: /
  #       service: backend
  #       port: 8000
  #   # splitByHost per-host overrides (ignored in multiHost mode):
  #   # className: nginx-internal
  #   # annotations:
  #   #   nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # - host: app.biznez.example.com
  #   paths:
  #     - path: /
  #       service: frontend
  #       port: 80

  tls:
    enabled: false
    mode: existingSecret  # existingSecret | certManager
    secretName: ""
    clusterIssuer: ""

  # Opt-in: add nginx streaming annotations (proxy-read-timeout, proxy-buffering, etc.)
  applyNginxStreamingAnnotations: false

# ---------------------------------------------------------------------------
# Gateway API (alternative to Ingress)
# ---------------------------------------------------------------------------
gatewayApi:
  enabled: false

  gatewayRef:
    name: ""
    namespace: ""

  httpRoutes: []
  # - hostname: api.biznez.example.com
  #   service: backend
  # - hostname: app.biznez.example.com
  #   service: frontend

# ---------------------------------------------------------------------------
# Network policies
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false

  ingress:
    namespaceSelector: {}
    # Opt-in: allow ingress from any namespace when namespaceSelector is empty.
    # Only relevant when both networkPolicy and ingress are enabled.
    # When false (default), namespaceSelector is required to avoid overly permissive rules.
    allowFromAnyNamespace: false

  egress:
    dns:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchExpressions:
          - key: k8s-app
            operator: In
            values: ["kube-dns", "coredns"]
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    proxy:
      cidrs: []
      ports: [3128, 443]
      httpProxy: ""
      httpsProxy: ""
      noProxy: ""

    externalServices:
      cidrs: []
      ports: [443]

    mcpTargets:
      namespaceSelectors: []
      ports: [443, 8080]

    # Allow all egress on port 443 (eval default; production should be false)
    allowAllHttps: true

# ---------------------------------------------------------------------------
# RBAC
# ---------------------------------------------------------------------------
rbac:
  # Create ServiceAccount, Role, RoleBinding
  create: true

  # Use an existing ServiceAccount instead of creating one
  serviceAccountName: ""

  # If the backend needs cross-namespace access for agent workspace management,
  # an operator must pre-create a ClusterRole/ClusterRoleBinding outside this chart.
  # This chart only creates namespaced Role/RoleBinding (zero cluster-scoped resources).

# ---------------------------------------------------------------------------
# Autoscaling (HPA)
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false

  minReplicas: 2
  maxReplicas: 10

  metrics:
    cpu:
      targetAverageUtilization: 70
    memory:
      targetAverageUtilization: 80

# ---------------------------------------------------------------------------
# Pod Disruption Budget
# ---------------------------------------------------------------------------
pdb:
  enabled: false
  minAvailable: 1
