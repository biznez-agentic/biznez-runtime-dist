# Biznez Agentic Runtime -- Helm values (evaluation defaults)
# See docs/PACKAGING-PLAN.md for the full configuration contract.
# See values-production.yaml for CIS-hardened production overrides.

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
global:
  # Profile: eval | production
  # When "production", Helm templates enforce required fields via {{ required }}/{{ fail }}.
  profile: eval

  # Prepended to all image references: {imageRegistry}/{component.image.repository}:{tag}
  imageRegistry: ""

  # Pull secrets for private registries
  imagePullSecrets: []
  # - name: regcred

  # Default storage class (empty = cluster default)
  storageClass: ""

  # Default image pull policy (overridable per component)
  imagePullPolicy: IfNotPresent

  # Security profile: hardened | permissive
  securityProfile: hardened

  # Pod-level security context applied to all pods (overridable per component)
  podSecurityContext:
    runAsNonRoot: true
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  # Container-level security context applied to all containers (overridable per component)
  containerSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

# ---------------------------------------------------------------------------
# Backend (FastAPI platform API)
# ---------------------------------------------------------------------------
backend:
  image:
    repository: biznez/platform-api
    tag: ""  # Defaults to appVersion from Chart.yaml
    digest: ""  # If set, overrides tag (recommended for production)
    pullPolicy: ""  # Defaults to global.imagePullPolicy

  replicas: 1

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Non-secret configuration (rendered into ConfigMap)
  config:
    environment: production
    logLevel: INFO
    corsOrigins: ""  # Derived from ingress if empty; comma-separated URLs
    frontendUrl: ""  # Derived from ingress if empty
    apiUrl: ""  # Public backend URL; derived from ingress if empty
    jwtAlgorithm: HS256
    jwtAccessTokenExpireMinutes: "30"
    jwtRefreshTokenExpireDays: "7"
    bcryptRounds: "12"
    runtimeName: biznez-runtime
    maxConcurrentAgents: "10"
    agentTimeoutSeconds: "300"
    prometheusEnabled: "true"
    prometheusPort: "9090"

  # Secret management
  existingSecret: ""  # K8s Secret name; if set, chart does NOT create a Secret
  secrets:
    encryptionKey: ""  # Fernet key (auto-generated by CLI if empty)
    jwtSecret: ""  # JWT signing key (auto-generated by CLI if empty)

  # SSE streaming timeouts
  streaming:
    proxyReadTimeout: 300
    proxySendTimeout: 300
    proxyBuffering: "off"
    maxBodySize: 10m

  # Service
  service:
    type: ClusterIP
    port: 8000
    annotations: {}

  # Health probes
  probes:
    liveness:
      httpGet:
        path: /api/v1/health
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      httpGet:
        path: /api/v1/health
        port: 8000
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      httpGet:
        path: /api/v1/health
        port: 8000
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 30

  # Per-component security context overrides (merged with global defaults)
  securityContext: {}

  # Additional env vars (list of {name, value} or {name, valueFrom})
  extraEnv: []

  # Additional volumes and mounts
  extraVolumes: []
  extraVolumeMounts: []

  # Pod annotations
  podAnnotations: {}

  # Node selector, tolerations, affinity
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Frontend (React/Nginx)
# ---------------------------------------------------------------------------
frontend:
  image:
    repository: biznez/web-app
    tag: ""
    digest: ""
    pullPolicy: ""

  replicas: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Non-secret configuration (rendered into ConfigMap)
  config:
    # API backend URL (in-cluster default; overridden when ingress is enabled)
    apiUrl: ""

  # Service
  service:
    type: ClusterIP
    port: 80
    annotations: {}

  # Health probes
  probes:
    liveness:
      httpGet:
        path: /health
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  # Per-component security context overrides
  securityContext:
    runAsUser: 101  # nginx user
    runAsGroup: 101

  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# PostgreSQL (embedded -- eval only)
# ---------------------------------------------------------------------------
postgres:
  # Set to false for production (requires external DB via postgres.external)
  enabled: true

  image:
    repository: postgres
    tag: "15-alpine"
    digest: ""
    pullPolicy: ""

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # PVC storage
  storage: 10Gi
  storageClassName: ""  # Empty = cluster default

  # Embedded DB settings
  database: biznez_platform

  # Secret management (embedded postgres)
  existingSecret: ""  # K8s Secret with POSTGRES_USER, POSTGRES_PASSWORD
  secrets:
    user: biznez
    password: ""  # Auto-generated by CLI if empty

  # Connection pool settings (passed to backend)
  pool:
    size: "5"
    maxOverflow: "10"
    poolRecycle: "1800"

  # Per-component security context overrides
  securityContext:
    runAsUser: 999
    fsGroup: 999
    readOnlyRootFilesystem: false

  # External database (used when postgres.enabled=false)
  external:
    host: ""
    port: "5432"
    database: biznez_platform
    sslMode: require
    # Full URL override -- takes precedence over individual fields above
    databaseUrl: ""
    # Secret containing POSTGRES_USER, POSTGRES_PASSWORD
    existingSecret: ""

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Agent Gateway (MCP proxy)
# ---------------------------------------------------------------------------
gateway:
  enabled: true

  image:
    repository: ghcr.io/agentgateway/agentgateway
    tag: "0.1.0"
    digest: ""
    pullPolicy: ""

  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # In-cluster base URL for backend to reach gateway
  baseUrl: "http://biznez-gateway:8080"

  # Timeouts
  timeouts:
    connectTimeout: 10s
    requestTimeout: 120s
    idleTimeout: 300s

  # Secret management (gateway API keys for MCP targets)
  existingSecret: ""
  secrets: {}
  # Example:
  #   TAVILY_API_KEY: "tvly-..."
  #   BRAVE_API_KEY: "BSA..."

  # Gateway YAML configuration (rendered into ConfigMap)
  config:
    listeners:
      - name: default
        address: 0.0.0.0
        port: 8080
        protocol: MCP
    targets: []
    routes: []

  # Health probes
  probes:
    liveness:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

  # Service
  service:
    type: ClusterIP
    port: 8080
    adminPort: 15000
    annotations: {}

  securityContext: {}
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
auth:
  # Mode: local | oidc | dual
  mode: local

  # OIDC configuration (required when mode=oidc or mode=dual)
  oidc:
    issuer: ""
    audience: ""
    jwksUrl: ""  # Auto-derived from issuer if empty
    jwksCacheTtl: 3600
    clockSkewSeconds: 30
    claims:
      subject: sub
      email: email
      name: name
      groups: groups
    roleMapping:
      adminGroups: []
      userGroups: []
    allowedEmailDomains: []

  # Local JWT auth (eval only)
  local:
    adminBootstrap:
      email: admin@biznez.local
      # Password auto-generated, printed in NOTES.txt

  # Secret for OIDC client secret
  existingSecret: ""  # K8s Secret with AUTH_CLIENT_SECRET

# ---------------------------------------------------------------------------
# LLM provider
# ---------------------------------------------------------------------------
llm:
  provider: none  # openai | anthropic | custom | none

  # Secret management
  existingSecret: ""  # K8s Secret with LLM_API_KEY
  secrets:
    apiKey: ""

# ---------------------------------------------------------------------------
# Langfuse (LLM observability)
# ---------------------------------------------------------------------------
langfuse:
  enabled: false

  host: "https://cloud.langfuse.com"

  # Secret management
  existingSecret: ""  # K8s Secret with LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY
  secrets:
    publicKey: ""
    secretKey: ""

# ---------------------------------------------------------------------------
# Database migration
# ---------------------------------------------------------------------------
migration:
  # Mode: auto | manual | hook
  #   auto: initContainer runs alembic upgrade head before backend starts
  #   manual: no migration; operator runs manually
  #   hook: Helm pre-upgrade hook Job (blocks upgrade until migration completes)
  mode: auto

  # Job TTL (seconds after completion) for hook mode
  jobTtlSeconds: 600

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false  # Eval default: ClusterIP + port-forward

  className: ""
  annotations: {}

  # Rendering mode: multiHost | splitByHost
  mode: multiHost

  hosts: []
  # - host: api.biznez.example.com
  #   paths:
  #     - path: /
  #       service: backend
  #       port: 8000
  # - host: app.biznez.example.com
  #   paths:
  #     - path: /
  #       service: frontend
  #       port: 80

  tls:
    enabled: false
    mode: existingSecret  # existingSecret | certManager
    secretName: ""
    clusterIssuer: ""

  # Opt-in: add nginx streaming annotations (proxy-read-timeout, proxy-buffering, etc.)
  applyNginxStreamingAnnotations: false

# ---------------------------------------------------------------------------
# Gateway API (alternative to Ingress)
# ---------------------------------------------------------------------------
gatewayApi:
  enabled: false

  gatewayRef:
    name: ""
    namespace: ""

  httpRoutes: []
  # - hostname: api.biznez.example.com
  #   service: backend
  # - hostname: app.biznez.example.com
  #   service: frontend

# ---------------------------------------------------------------------------
# Network policies
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false

  ingress:
    namespaceSelector: {}

  egress:
    dns:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchExpressions:
          - key: k8s-app
            operator: In
            values: ["kube-dns", "coredns"]
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    proxy:
      cidrs: []
      ports: [3128, 443]
      httpProxy: ""
      httpsProxy: ""
      noProxy: ""

    externalServices:
      cidrs: []
      ports: [443]

    mcpTargets:
      namespaceSelectors: []
      ports: [443, 8080]

    # Allow all egress on port 443 (eval default; production should be false)
    allowAllHttps: true

# ---------------------------------------------------------------------------
# RBAC
# ---------------------------------------------------------------------------
rbac:
  # Create ServiceAccount, Role, RoleBinding
  create: true

  # Use an existing ServiceAccount instead of creating one
  serviceAccountName: ""

  # If the backend needs cross-namespace access for agent workspace management,
  # an operator must pre-create a ClusterRole/ClusterRoleBinding outside this chart.
  # This chart only creates namespaced Role/RoleBinding (zero cluster-scoped resources).

# ---------------------------------------------------------------------------
# Autoscaling (HPA)
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false

  minReplicas: 2
  maxReplicas: 10

  metrics:
    cpu:
      targetAverageUtilization: 70
    memory:
      targetAverageUtilization: 80

# ---------------------------------------------------------------------------
# Pod Disruption Budget
# ---------------------------------------------------------------------------
pdb:
  enabled: false
  minAvailable: 1
