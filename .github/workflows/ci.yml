name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: ShellCheck CLI
        run: shellcheck -s bash -e SC1091 cli/biznez-cli
      - name: ShellCheck lib
        run: shellcheck -s bash -e SC1091,SC2317,SC2329 cli/lib/images.sh

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: bash tests/test-cli.sh

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [shellcheck, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          curl -fsSL -o /tmp/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
          sudo install /tmp/yq /usr/local/bin/yq
          yq --version

      - name: Install crane
        run: |
          curl -fsSL "https://github.com/google/go-containerregistry/releases/download/v0.20.3/go-containerregistry_Linux_x86_64.tar.gz" | \
            sudo tar -xzf - -C /usr/local/bin crane
          crane version

      - name: Run integration tests
        run: bash tests/test-release-integration.sh

  bundle:
    name: CLI Bundle
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build bundle
        run: |
          bash release/bundle-cli.sh cli/biznez-cli cli/lib/images.sh > cli/biznez-cli-bundle
          chmod +x cli/biznez-cli-bundle

      - name: Verify bundle is functional
        run: |
          ./cli/biznez-cli-bundle --version
          ./cli/biznez-cli-bundle --help | grep -q export-images
          ./cli/biznez-cli-bundle --help | grep -q build-release

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: biznez-cli-bundle
          path: cli/biznez-cli-bundle
