name: Teardown Eval Environment

on:
  workflow_dispatch:
    inputs:
      env_id:
        description: 'Environment ID (e.g., customer-ab12)'
        required: true
        type: string
      region:
        description: 'GCP region'
        required: true
        type: choice
        options:
          - europe-west2
          - us-central1
          - us-east1
          - asia-southeast1
      gcp_project_id:
        description: 'GCP project ID (defaults to vars.GCP_PROJECT_ID)'
        required: false
        type: string
      confirm_destroy:
        description: 'Type the env_id to confirm destruction'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  ENV_ID: ${{ inputs.env_id }}
  REGION: ${{ inputs.region }}
  GCP_PROJECT_ID: ${{ inputs.gcp_project_id || vars.GCP_PROJECT_ID }}
  CONFIRM_DESTROY: ${{ inputs.confirm_destroy }}

concurrency:
  group: eval-${{ inputs.env_id }}
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Validate confirmation
  # -------------------------------------------------------------------------
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Validate env_id format
        run: |
          if [[ ! "$ENV_ID" =~ ^[a-z][a-z0-9-]{2,19}-[a-z0-9]{4}$ ]]; then
            echo "::error::env_id must match ^[a-z][a-z0-9-]{2,19}-[a-z0-9]{4}$"
            exit 1
          fi

      - name: Validate confirmation matches env_id
        run: |
          if [ "$CONFIRM_DESTROY" != "$ENV_ID" ]; then
            echo "::error::confirm_destroy must exactly match env_id to proceed"
            exit 1
          fi
          echo "Destruction confirmed for env_id: ${ENV_ID}"

  # -------------------------------------------------------------------------
  # Job 2: Uninstall runtime (continue-on-error)
  # -------------------------------------------------------------------------
  uninstall-runtime:
    name: Uninstall Runtime
    needs: validate
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform/environments/eval
        run: |
          terraform init \
            -backend-config="bucket=biznez-terraform-state-${GCP_PROJECT_ID}" \
            -backend-config="prefix=eval/${ENV_ID}"

      - name: Discover cluster name
        id: tf-cluster
        working-directory: infra/terraform/environments/eval
        continue-on-error: true
        run: |
          # Try Terraform state first
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null) || true
          if [ -n "$CLUSTER_NAME" ] && [[ "$CLUSTER_NAME" =~ ^[a-z][a-z0-9-]+$ ]]; then
            echo "cluster_name=${CLUSTER_NAME}" >> "$GITHUB_OUTPUT"
            echo "Cluster name from Terraform state: ${CLUSTER_NAME}"
            exit 0
          fi

          # Fallback: derive from naming convention
          EXPECTED_NAME="biznez-eval-${ENV_ID}"
          echo "Terraform state empty, checking for cluster by naming convention: ${EXPECTED_NAME}"
          if gcloud container clusters describe "$EXPECTED_NAME" \
               --region "$REGION" --project "$GCP_PROJECT_ID" \
               --format="value(name)" &>/dev/null; then
            echo "cluster_name=${EXPECTED_NAME}" >> "$GITHUB_OUTPUT"
            echo "Cluster found via gcloud: ${EXPECTED_NAME}"
          else
            echo "::warning::No cluster found in Terraform state or via gcloud (${EXPECTED_NAME})"
          fi

      - name: Get GKE credentials
        if: steps.tf-cluster.outputs.cluster_name != ''
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ steps.tf-cluster.outputs.cluster_name }}
          location: ${{ inputs.region }}
          project_id: ${{ inputs.gcp_project_id || vars.GCP_PROJECT_ID }}

      - name: Run teardown script
        if: steps.tf-cluster.outputs.cluster_name != ''
        run: |
          bash infra/scripts/teardown.sh \
            --namespace biznez \
            --release biznez

  # -------------------------------------------------------------------------
  # Job 3: Destroy infrastructure via Terraform
  # -------------------------------------------------------------------------
  destroy-infrastructure:
    name: Destroy Infrastructure
    needs: uninstall-runtime
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform/environments/eval
        run: |
          terraform init \
            -backend-config="bucket=biznez-terraform-state-${GCP_PROJECT_ID}" \
            -backend-config="prefix=eval/${ENV_ID}"

      - name: Terraform destroy
        id: tf-destroy
        working-directory: infra/terraform/environments/eval
        continue-on-error: true
        run: |
          terraform destroy -auto-approve \
            -var="env_id=${ENV_ID}" \
            -var="region=${REGION}" \
            -var="project_id=${GCP_PROJECT_ID}"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fallback — gcloud cleanup
        id: gcloud-fallback
        continue-on-error: true
        run: |
          # Resource naming convention: biznez-eval-{env_id}-{suffix}
          PREFIX="biznez-eval-${ENV_ID}"
          CLEANED=""

          # Check if GKE cluster still exists
          if gcloud container clusters describe "$PREFIX" \
               --region "$REGION" --project "$GCP_PROJECT_ID" \
               --format="value(name)" &>/dev/null; then
            echo "::warning::Resources still exist after Terraform destroy — running gcloud fallback cleanup"

            # 1. Delete GKE cluster (longest operation, blocks subnet/VPC deletion)
            echo "Deleting GKE cluster: ${PREFIX}"
            if gcloud container clusters delete "$PREFIX" \
                 --region "$REGION" --project "$GCP_PROJECT_ID" \
                 --quiet 2>&1; then
              CLEANED="${CLEANED}cluster,"
              echo "GKE cluster deleted"
            else
              echo "::warning::Failed to delete GKE cluster ${PREFIX}"
            fi
          else
            echo "No GKE cluster found — Terraform destroy succeeded or cluster already gone"
          fi

          # 2. Delete Cloud NAT (must go before router)
          if gcloud compute routers nats describe "${PREFIX}-nat" \
               --router="${PREFIX}-router" --region="$REGION" \
               --project="$GCP_PROJECT_ID" &>/dev/null; then
            echo "Deleting Cloud NAT: ${PREFIX}-nat"
            gcloud compute routers nats delete "${PREFIX}-nat" \
              --router="${PREFIX}-router" --region="$REGION" \
              --project="$GCP_PROJECT_ID" --quiet 2>&1 && CLEANED="${CLEANED}nat," || true
          fi

          # 3. Delete Cloud Router
          if gcloud compute routers describe "${PREFIX}-router" \
               --region="$REGION" --project="$GCP_PROJECT_ID" &>/dev/null; then
            echo "Deleting Cloud Router: ${PREFIX}-router"
            gcloud compute routers delete "${PREFIX}-router" \
              --region="$REGION" --project="$GCP_PROJECT_ID" \
              --quiet 2>&1 && CLEANED="${CLEANED}router," || true
          fi

          # 4. Delete subnet (must go before VPC)
          if gcloud compute networks subnets describe "${PREFIX}-subnet" \
               --region="$REGION" --project="$GCP_PROJECT_ID" &>/dev/null; then
            echo "Deleting subnet: ${PREFIX}-subnet"
            gcloud compute networks subnets delete "${PREFIX}-subnet" \
              --region="$REGION" --project="$GCP_PROJECT_ID" \
              --quiet 2>&1 && CLEANED="${CLEANED}subnet," || true
          fi

          # 5. Delete VPC
          if gcloud compute networks describe "${PREFIX}-vpc" \
               --project="$GCP_PROJECT_ID" &>/dev/null; then
            echo "Deleting VPC: ${PREFIX}-vpc"
            gcloud compute networks delete "${PREFIX}-vpc" \
              --project="$GCP_PROJECT_ID" \
              --quiet 2>&1 && CLEANED="${CLEANED}vpc," || true
          fi

          # 6. Delete Artifact Registry repo
          if gcloud artifacts repositories describe "${PREFIX}-runtime" \
               --location="$REGION" --project="$GCP_PROJECT_ID" &>/dev/null; then
            echo "Deleting AR repo: ${PREFIX}-runtime"
            gcloud artifacts repositories delete "${PREFIX}-runtime" \
              --location="$REGION" --project="$GCP_PROJECT_ID" \
              --quiet 2>&1 && CLEANED="${CLEANED}ar-repo," || true
          fi

          if [ -n "$CLEANED" ]; then
            echo "gcloud_cleaned=${CLEANED%,}" >> "$GITHUB_OUTPUT"
            echo "Fallback cleanup completed: ${CLEANED%,}"
          else
            echo "gcloud_cleaned=none" >> "$GITHUB_OUTPUT"
            echo "No resources required fallback cleanup"
          fi

      - name: Clean up Terraform state
        continue-on-error: true
        run: |
          STATE_BUCKET="biznez-terraform-state-${GCP_PROJECT_ID}"
          STATE_PREFIX="eval/${ENV_ID}"
          echo "Cleaning up Terraform state at gs://${STATE_BUCKET}/${STATE_PREFIX}/"
          gsutil -m rm -r "gs://${STATE_BUCKET}/${STATE_PREFIX}/" 2>/dev/null || true

      - name: Write summary
        if: always()
        env:
          UNINSTALL_RESULT: ${{ needs.uninstall-runtime.result }}
          GCLOUD_CLEANED: ${{ steps.gcloud-fallback.outputs.gcloud_cleaned }}
        run: |
          TF_STATUS="${{ steps.tf-destroy.outcome }}"
          FALLBACK_STATUS="${{ steps.gcloud-fallback.outcome }}"

          if [ "$TF_STATUS" = "success" ] && [ "$GCLOUD_CLEANED" = "none" ]; then
            STATUS="Terraform destroy succeeded"
          elif [ -n "$GCLOUD_CLEANED" ] && [ "$GCLOUD_CLEANED" != "none" ]; then
            STATUS="Cleaned up via gcloud fallback (${GCLOUD_CLEANED})"
          else
            STATUS="Completed (check logs for details)"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Teardown: ${ENV_ID}

          | Step | Status |
          |------|--------|
          | **Runtime uninstall** | ${UNINSTALL_RESULT} |
          | **Terraform destroy** | ${TF_STATUS} |
          | **gcloud fallback** | ${FALLBACK_STATUS} (${GCLOUD_CLEANED:-skipped}) |
          | **Overall** | ${STATUS} |

          Environment \`${ENV_ID}\` teardown complete.
          EOF
