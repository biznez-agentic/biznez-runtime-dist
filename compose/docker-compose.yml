# =============================================================================
# Biznez Agentic Runtime -- Docker Compose (Evaluation / Demo)
# =============================================================================
# Production-ready stack using pre-built images (not dev hot-reload).
#
# Quick start:
#   ./setup.sh              # generates secrets, starts services
#
# Manual start:
#   cp .env.template .env   # then edit .env
#   docker compose up -d
#
# Enable Agent Gateway:
#   docker compose --profile gateway up -d
#
# All ports and images are configurable via .env variables.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biznez_runtime}
      POSTGRES_USER: ${POSTGRES_USER:-biznez_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biznez_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - biznez-network

  # ---------------------------------------------------------------------------
  # Backend (FastAPI / Uvicorn)
  # ---------------------------------------------------------------------------
  # No migrations by default. See Phase 6.1 in the packaging plan for
  # migration-on-startup options.
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/biznez-agentic/runtime-backend:latest}
    pull_policy: ${COMPOSE_PULL_POLICY:-if_not_present}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: >
      sh -c "uvicorn src.agentic_runtime.api.main:app
        --host 0.0.0.0
        --port 8000
        --workers $${WORKERS:-2}
        --log-level $${LOG_LEVEL:-info}"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      AUTH_MODE: ${AUTH_MODE:-local}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKERS: ${WORKERS:-2}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      LLM_PROVIDER: ${LLM_PROVIDER:-none}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - biznez-network

  # ---------------------------------------------------------------------------
  # Frontend (nginx serving React SPA)
  # ---------------------------------------------------------------------------
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/biznez-agentic/runtime-frontend:latest}
    pull_policy: ${COMPOSE_PULL_POLICY:-if_not_present}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - biznez-network

  # ---------------------------------------------------------------------------
  # Agent Gateway (optional -- enable with --profile gateway)
  # ---------------------------------------------------------------------------
  gateway:
    image: ${GATEWAY_IMAGE:-ghcr.io/agentgateway/agentgateway:0.1.0}
    pull_policy: ${COMPOSE_PULL_POLICY:-if_not_present}
    restart: unless-stopped
    profiles:
      - gateway
    ports:
      - "${GATEWAY_PORT:-8090}:8080"
    volumes:
      - ./gateway-config.yaml:/app/config.yaml:ro
    depends_on:
      backend:
        condition: service_started
    networks:
      - biznez-network

# =============================================================================
# Networks & Volumes
# =============================================================================
networks:
  biznez-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
