# =============================================================================
# Nginx server block for Biznez Agentic Runtime -- Docker Compose
# =============================================================================
# Mounted to /etc/nginx/conf.d/default.conf (NOT /etc/nginx/nginx.conf).
# The base nginx.conf from the image provides events{}, http{}, mime.types.
#
# In Docker Compose, nginx is the single entry point (port 8080 on host)
# that proxies /api/ and /ws to the backend. In Kubernetes, the Ingress
# or Gateway API handles routing instead.
# =============================================================================

# WebSocket upgrade map -- valid at http{} level (conf.d is included there)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ----- Health check -----
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ----- API proxy -----
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    # ----- WebSocket proxy -----
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ----- Static assets -----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ----- SPA routing -----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- Deny hidden files -----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
